name: Release

# Push a tag like `v1.0.0` on `main` and this workflow publishes the same
# build artifact to both npm and ClawHub. The tag is the source of truth —
# the package.json version must match (the workflow refuses to publish if
# they drift). See RELEASING.md for the operator recipe.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0). Must already exist on main."
        required: true

permissions:
  contents: read
  id-token: write   # required for npm Trusted Publishing + ClawHub OIDC

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-npm:
    name: publish to npm (Trusted Publishing)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the tagged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up Node 24 (ships with npm >= 11.5.1 — Trusted Publishing requirement)
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Print resolved node + npm versions (sanity)
        run: |
          node --version
          npm --version

      - name: Verify tag matches package.json version
        run: |
          set -euo pipefail
          TAG_RAW="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          TAG="${TAG_RAW#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version v$PKG"
            exit 1
          fi
          echo "OK: tag v$TAG matches package.json v$PKG"

      - name: Install dependencies (frozen lockfile)
        run: npm ci

      - name: Typecheck + build + test (regression gate)
        run: |
          npx tsc --noEmit
          npm run build
          npm run coverage

      - name: Preview the tarball
        run: |
          npm pack --dry-run
          npm pack
          ls -lh openclaw-hawkins-*.tgz

      - name: Publish to npm (Trusted Publishing + provenance)
        run: npm publish --provenance --access public

      - name: Upload tarball as workflow artifact (audit)
        uses: actions/upload-artifact@v4
        with:
          name: npm-tarball-${{ github.ref_name }}
          path: openclaw-hawkins-*.tgz
          if-no-files-found: error

  publish-clawhub:
    name: publish to ClawHub
    needs: publish-npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout the tagged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install ClawHub CLI
        run: npm install -g clawhub

      - name: Write ClawHub auth config (the CLI doesn't read CLAWHUB_TOKEN directly)
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          install -m 700 -d "$RUNNER_TEMP"
          jq -n --arg token "$CLAWHUB_TOKEN" \
                --arg registry "https://clawhub.ai" \
                '{registry: $registry, token: $token}' \
            > "$RUNNER_TEMP/clawhub-config.json"
          chmod 600 "$RUNNER_TEMP/clawhub-config.json"
          echo "CLAWHUB_CONFIG_PATH=$RUNNER_TEMP/clawhub-config.json" >> "$GITHUB_ENV"

      - name: Publish to ClawHub
        run: |
          set -euo pipefail
          TAG_RAW="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          VERSION="${TAG_RAW#v}"
          # NOTE: --family is intentionally NOT set. The first ClawHub publish
          # (v1.0.1) was auto-detected as `bundle-plugin` because this repo's
          # top-level `agents/` + `skills/` directories trigger ClawHub's bundle-
          # marker heuristic. ClawHub locks family at first publish — passing
          # `--family code-plugin` later is rejected with "family changes are not
          # allowed". Auto-detection on every release stays self-consistent.
          clawhub package publish "${{ github.repository }}@$TAG_RAW" \
            --version "$VERSION" \
            --tags latest \
            --source-repo "${{ github.repository }}" \
            --source-commit "${{ github.sha }}" \
            --source-ref "$TAG_RAW" \
            --json
